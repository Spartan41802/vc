<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GistChat · shared via .txt file</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e2e2e2;
            font-family: system-ui, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            display: flex;
            width: 1300px;
            max-width: 100%;
            height: 90vh;
            background: #f5f5f5;
            border: 1px solid #b0b0b0;
        }
        .sidebar {
            width: 260px;
            background: #eaeaea;
            border-right: 1px solid #c0c0c0;
            display: flex;
            flex-direction: column;
        }
        .server-header { padding: 18px 12px; border-bottom: 1px solid #c0c0c0; background: #e2e2e2; }
        .server-name { font-weight: 600; font-size: 1.1rem; color: #2c2c2c; }
        .channels-section { flex: 1; padding: 12px 0 0 0; }
        .channels-label { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; padding: 8px 12px; color: #5a5a5a; }
        .channel-item {
            padding: 8px 12px; margin: 2px 8px; font-size: 0.9rem; color: #2c2c2c;
            cursor: pointer; border: 1px solid transparent;
        }
        .channel-item:hover { background-color: #d4d4d4; border-color: #b0b0b0; }
        .channel-item.active { background-color: #d0d0d0; border-left: 3px solid #6c6c6c; }
        .hash { color: #6e6e6e; }
        .user-area {
            margin-top: auto; padding: 16px 12px; border-top: 1px solid #c0c0c0;
            background: #e2e2e2;
        }
        .nickname-row { display: flex; gap: 8px; align-items: center; }
        .nickname-label { font-size: 0.75rem; color: #3a3a3a; }
        #nicknameInput { flex: 1; background: white; border: 1px solid #b0b0b0; padding: 6px 8px; font-size: 0.8rem; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fafafa; }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid #c0c0c0; background: #f0f0f0; }
        .channel-title { font-size: 1rem; font-weight: 600; color: #1f1f1f; }
        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; background: #fefefe; }
        .message { border-bottom: 1px solid #e2e2e2; padding-bottom: 8px; }
        .message-header { display: flex; gap: 10px; margin-bottom: 4px; }
        .message-author { font-weight: 600; font-size: 0.85rem; color: #2a2a2a; }
        .message-timestamp { font-size: 0.65rem; color: #8a8a8a; }
        .message-text { font-size: 0.9rem; color: #1a1a1a; word-break: break-word; }
        .input-area { padding: 12px 16px; background: #f0f0f0; border-top: 1px solid #c0c0c0; display: flex; gap: 10px; }
        #messageInput { flex: 1; background: white; border: 1px solid #b0b0b0; padding: 10px 12px; font-size: 0.85rem; }
        button { background: #e2e2e2; border: 1px solid #a0a0a0; padding: 8px 16px; cursor: pointer; color: #222; }
        button:hover { background: #d4d4d4; }
        .empty-messages { font-size: 0.8rem; color: #7e7e7e; text-align: center; padding: 32px; }
        .info-note { font-size: 0.65rem; padding: 6px 12px; background: #ececec; color: #6a6a6a; text-align: center; border-top: 1px solid #ccc; }
        .status { font-size: 0.7rem; padding: 4px 12px; background: #f9f2e0; color: #8a6e2e; text-align: center; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="server-header"><div class="server-name">⎯ gist.chat ⎯</div></div>
        <div class="channels-section">
            <div class="channels-label">TEXT CHANNELS</div>
            <div class="channel-item active" data-channel="main"><div class="channel-name"><span class="hash">#</span> main</div></div>
        </div>
        <div class="user-area">
            <div class="nickname-row">
                <span class="nickname-label">nickname</span>
                <input type="text" id="nicknameInput" maxlength="24" placeholder="anonymous">
            </div>
        </div>
    </div>
    <div class="chat-main">
        <div class="chat-header">
            <div class="channel-title">#main (saved to .txt gist)</div>
            <div class="channel-topic">polling every 2s · uses GitHub token</div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-messages">loading messages from gist...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message... (enter to send)">
            <button id="sendBtn">Send</button>
            <button id="clearBtn">clear all messages</button>
        </div>
        <div class="status" id="statusMsg">connecting...</div>
        <div class="info-note">📄 messages stored in a GitHub Gist (plain .txt) · everyone sees same chat</div>
    </div>
</div>

<script>
    // ======================== CONFIGURATION ========================
    // TODO: Replace with your own Gist details
    const GIST_RAW_URL = "https://gist.github.com/Spartan41802/8d9414d39f424733158495f47dfb8dca";
    const GIST_API_URL = "https://api.github.com/gists/8d9414d39f424733158495f47dfb8dca";   // e.g., "https://api.github.com/gists/abcdef123456"
    const GITHUB_TOKEN = "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";        // needs 'gist' scope
    
    // Only one channel for simplicity (you can add more by storing separate files)
    // ================================================================
    
    let currentNickname = localStorage.getItem('gistchat_nickname') || 'guest';
    let pollingInterval = null;
    let lastKnownContent = "";
    
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const nicknameInput = document.getElementById('nicknameInput');
    const statusSpan = document.getElementById('statusMsg');
    
    nicknameInput.value = currentNickname;
    
    // Helper: update status
    function setStatus(text, isError = false) {
        statusSpan.textContent = text;
        statusSpan.style.background = isError ? "#ffe0e0" : "#f9f2e0";
        statusSpan.style.color = isError ? "#b00020" : "#8a6e2e";
        setTimeout(() => {
            if (statusSpan.textContent === text) {
                statusSpan.style.background = "#f9f2e0";
                statusSpan.style.color = "#8a6e2e";
            }
        }, 2000);
    }
    
    // Parse the .txt file (each line = "author: timestamp: message")
    // Format: "John Doe: 14:32: Hello world"
    // We'll store as "author: HH:MM: message" – timestamp added by server when sending.
    function parseMessagesFromText(text) {
        if (!text.trim()) return [];
        const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
        const messages = [];
        for (let line of lines) {
            // Expected format: "Author: 12:34: Message text"
            const firstColon = line.indexOf(':');
            if (firstColon === -1) continue;
            const author = line.substring(0, firstColon).trim();
            const rest = line.substring(firstColon + 1).trim();
            const secondColon = rest.indexOf(':');
            if (secondColon === -1) continue;
            const timeStr = rest.substring(0, secondColon).trim();
            const messageText = rest.substring(secondColon + 1).trim();
            messages.push({ author, time: timeStr, text: messageText });
        }
        return messages;
    }
    
    // Convert messages array back to .txt format
    function messagesToText(messages) {
        return messages.map(m => `${m.author}: ${m.time}: ${m.text}`).join('\n');
    }
    
    // Fetch current gist content (read-only via raw URL, no token needed)
    async function fetchMessagesFromGist() {
        try {
            const response = await fetch(GIST_RAW_URL + "?t=" + Date.now()); // cache buster
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            lastKnownContent = text;
            const messages = parseMessagesFromText(text);
            renderMessages(messages);
            setStatus(`last update: ${new Date().toLocaleTimeString()}`);
            return true;
        } catch (err) {
            console.error("Read error:", err);
            setStatus("Failed to read gist (check raw URL)", true);
            messagesContainer.innerHTML = '<div class="empty-messages">⚠️ Cannot read gist. Check URL / network.</div>';
            return false;
        }
    }
    
    // Write messages to gist (needs token)
    async function writeMessagesToGist(messagesArray) {
        const newContent = messagesToText(messagesArray);
        if (newContent === lastKnownContent) return true; // no change
        
        const gistId = GIST_API_URL.split('/').pop();
        const updateUrl = `https://api.github.com/gists/${gistId}`;
        
        try {
            const response = await fetch(updateUrl, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        "chatlog.txt": { content: newContent }
                    }
                })
            });
            if (!response.ok) {
                const errData = await response.text();
                throw new Error(`GitHub API error ${response.status}: ${errData}`);
            }
            lastKnownContent = newContent;
            setStatus("message saved to gist");
            return true;
        } catch (err) {
            console.error("Write error:", err);
            setStatus("❌ Failed to write to gist – token invalid or network block", true);
            return false;
        }
    }
    
    // Add a new message
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        const author = currentNickname.trim() || 'guest';
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        
        // 1. Fetch current messages (latest)
        const currentText = await fetch(GIST_RAW_URL + "?t=" + Date.now()).then(r => r.text()).catch(() => lastKnownContent);
        const currentMessages = parseMessagesFromText(currentText);
        
        // 2. Append new message
        currentMessages.push({ author, time: timeStr, text });
        
        // 3. Write back
        const success = await writeMessagesToGist(currentMessages);
        if (success) {
            messageInput.value = '';
            await fetchMessagesFromGist(); // refresh display
        }
    }
    
    // Clear all messages (admin-like)
    async function clearAllMessages() {
        if (!confirm("⚠️ DELETE ALL MESSAGES FOR EVERYONE? This cannot be undone.")) return;
        const emptyMessages = [];
        const success = await writeMessagesToGist(emptyMessages);
        if (success) {
            await fetchMessagesFromGist();
            setStatus("All messages cleared");
        }
    }
    
    // Render messages into DOM
    function renderMessages(messages) {
        messagesContainer.innerHTML = '';
        if (messages.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-messages';
            emptyDiv.innerText = '✧ no messages yet · type below ✧';
            messagesContainer.appendChild(emptyDiv);
            return;
        }
        for (const msg of messages) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            const header = document.createElement('div');
            header.className = 'message-header';
            const authorSpan = document.createElement('span');
            authorSpan.className = 'message-author';
            authorSpan.textContent = msg.author;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'message-timestamp';
            timeSpan.textContent = msg.time;
            header.appendChild(authorSpan);
            header.appendChild(timeSpan);
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = msg.text;
            msgDiv.appendChild(header);
            msgDiv.appendChild(textDiv);
            messagesContainer.appendChild(msgDiv);
        }
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Poll for new messages every 2 seconds
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        fetchMessagesFromGist(); // immediate
        pollingInterval = setInterval(() => {
            fetchMessagesFromGist().catch(console.warn);
        }, 2000);
    }
    
    // Nickname handler
    function updateNickname() {
        let newNick = nicknameInput.value.trim();
        if (newNick === "") newNick = "guest";
        currentNickname = newNick;
        localStorage.setItem('gistchat_nickname', currentNickname);
        setStatus(`nickname changed to ${currentNickname}`);
    }
    
    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    clearBtn.addEventListener('click', clearAllMessages);
    nicknameInput.addEventListener('change', updateNickname);
    nicknameInput.addEventListener('blur', updateNickname);
    
    // Start the app
    startPolling();
</script>
</body>
</html>
